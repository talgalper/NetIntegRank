name: netintegrank-hhnet
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # HHNet upstream recommendation is Python 2.7/3.5-era packages.
  # This environment pins to a Python 3.5-compatible stack for reproducibility.
  - python=3.5
  - numpy=1.14
  - scipy=0.19
  - h5py=2.7
  - networkx=1.11
  - matplotlib=2.1
  - pip
  - parallel
  - gfortran
  - numpy-base=1.14
  - pip:
      - argparse==1.4.0